name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run tests
        run: python -m pytest tests/ -v

  pyright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # pyrightconfig.json points at ./.venv — build the same layout
      # CI-side so the type check resolves imports exactly as local
      # development does.
      - name: Install into project venv
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ".[test]" pyright

      - name: Type check
        run: .venv/bin/pyright sphinxcontrib/

      # The parity oracle needs pyright-langserver, which only this
      # job installs — the pytest matrix jobs skip these tests. The
      # type-check step above has already warmed the npm bundle cache.
      - name: LSP-graph parity oracle
        run: .venv/bin/python -m pytest tests/test_lsp_parity.py -v
